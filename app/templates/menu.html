<!-- menu.html -->

{% extends "base.html" %}

{% block content %}

<section class="container py-5 text-center">
    <h1>Our Menu & Pricing</h1>

    <div class="row mt-5">

        <div class="col-md-4">
            <div class="glass-card p-4">
                <h3>Basic</h3>
                <h4>₹300 / plate</h4>
                <p>Veg meals, sweets, starters</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card p-4">
                <h3>Standard</h3>
                <h4>₹500 / plate</h4>
                <p>Veg + Non-Veg, desserts</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card p-4">
                <h3>Premium</h3>
                <h4>₹800 / plate</h4>
                <p>Full luxury catering experience</p>
            </div>
        </div>

    </div>
</section>

{% endblock %}
